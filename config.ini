[library]
# Максимальна кількість активних видач на одного читача
max_issuances = 4

# Стандартний термін видачі (днів)
default_loan_days = 14

# Назва бібліотеки (відображається в інтерфейсі)
name = Студентська бібліотека

[database]
# Ім'я файлу бази даних
filename = library.db

[logging]
# Рівень логування: DEBUG, INFO, WARNING, ERROR
level = INFO

# Ім'я файлу логів
filename = library.log
